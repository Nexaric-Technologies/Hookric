name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-build:
    name: Build client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Build
        working-directory: client
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

  worker-validate:
    name: Validate worker (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install worker deps
        working-directory: worker
        run: npm ci
      # Dry-run deploy — wrangler parses, type-checks, and bundles the
      # worker without hitting the Cloudflare API. Catches:
      #   - syntax errors in worker/index.js, hook-agent.js, analyzer.js
      #   - missing / mismatched durable_object bindings
      #   - bad wrangler.toml
      - name: Wrangler dry-run deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: dummy
          CLOUDFLARE_ACCOUNT_ID: dummy
        run: npx wrangler deploy --dry-run --outdir=dist
