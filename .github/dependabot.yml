version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      runtime-deps:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # Wrangler is pinned because its config schema moves faster than its semver.
      - dependency-name: "wrangler"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-dom"]
      build:
        patterns: ["vite", "@vitejs/plugin-react"]
      ui:
        patterns: ["tailwindcss", "postcss", "autoprefixer", "lucide-react", "clsx"]

  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Express 5 changed a lot. Stay on 4.x for now.
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
