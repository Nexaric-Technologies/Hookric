<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="nextcatch — instant webhook inspector. Drop a request at /r/your-id and watch it appear live. No signup, no database." />
    <meta property="og:title" content="nextcatch — instant webhook inspector" />
    <meta property="og:description" content="Real-time webhook capture and inspection in your browser. No signup, no database." />
    <title>nextcatch — instant webhook inspector</title>

    <!-- Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Satoshi (display) — variable font from Fontshare -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />

    <!-- Apply persisted theme before React mounts to avoid FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('nextcatch:v1:theme');
          var pref = stored || 'system';
          var resolved;
          if (pref === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            resolved = pref;
          }
          var root = document.documentElement;
          root.setAttribute('data-theme', resolved);
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          root.style.colorScheme = resolved;
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
